name: Build iOS App
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build Archive
        run: |
          xcodebuild archive \
          -scheme BluetoothRemoteCam \
          -archivePath build/BluetoothRemoteCam.xcarchive \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO
      - name: Export IPA
        run: |
          mkdir -p build/Payload
          cp -r build/BluetoothRemoteCam.xcarchive/Products/Applications/*.app build/Payload
          cd build && zip -r BluetoothRemoteCam.ipa Payload
      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: BluetoothRemoteCam-App
          path: build/BluetoothRemoteCam.ipa
